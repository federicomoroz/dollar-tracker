services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dollar_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dollar_tracker
    depends_on:
      - db

volumes:
  postgres_data:
